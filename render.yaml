services:
  - type: web
    name: stock-predict-api
    runtime: python
    rootDir: backend
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DB_PATH
        value: /tmp/stock_predict.db
      - key: PYTHON_VERSION
        value: 3.10.16
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVER_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false
      - key: FRONTEND_ORIGIN_REGEX
        sync: false
      - key: STARTUP_PREDICTION_ACCURACY_REFRESH
        value: "false"
      - key: STARTUP_PREDICTION_ACCURACY_REFRESH_TIMEOUT
        value: "20"
      - key: STARTUP_LEARNED_FUSION_REFRESH
        value: "false"
      - key: STARTUP_LEARNED_FUSION_REFRESH_TIMEOUT
        value: "25"
      - key: STARTUP_RESEARCH_ARCHIVE_SYNC
        value: "false"
      - key: STARTUP_RESEARCH_ARCHIVE_SYNC_TIMEOUT
        value: "35"
      - key: STARTUP_MARKET_OPPORTUNITY_PREWARM
        value: "false"
      - key: STARTUP_MARKET_OPPORTUNITY_PREWARM_TIMEOUT
        value: "45"
      - key: STARTUP_BACKGROUND_TASK_CONCURRENCY
        value: "1"
      - key: STARTUP_ALLOW_HEAVY_RENDER_JOBS
        value: "false"
      - key: OPENAI_API_KEY
        sync: false
      - key: ECOS_API_KEY
        sync: false
      - key: FMP_API_KEY
        sync: false
      - key: OPENDART_API_KEY
        sync: false
      - key: KOSIS_API_KEY
        sync: false
      - key: KOSIS_CPI_STATS_ID
        sync: false
      - key: KOSIS_EMPLOYMENT_STATS_ID
        sync: false
      - key: KOSIS_INDUSTRIAL_PRODUCTION_STATS_ID
        sync: false
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false
